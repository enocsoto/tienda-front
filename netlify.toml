# Configuración de despliegue en Netlify para Next.js (App Router)
# En Netlify UI: Build & deploy > Build settings > deja "Publish directory" VACÍO (el plugin lo gestiona).

[build]
  command = "npm run build"
  # Debe ser distinto del directorio base; el plugin @netlify/plugin-nextjs lo usa y lo ajusta internamente.
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Plugin oficial de Netlify para Next.js: genera y sirve correctamente
# todas las rutas (SSR, estáticas, client-side). Sin esto Netlify no
# entiende la estructura de Next.js y devuelve 404.
[[plugins]]
  package = "@netlify/plugin-nextjs"
